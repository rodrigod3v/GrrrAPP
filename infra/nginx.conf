# nginx.conf - Static server for Frontend and Reverse Proxy for FastAPI
# Place in /etc/nginx/sites-available/grrrapp /etc/nginx/conf.d/default.conf

server {
    listen 80;
    server_name _; # Change to domain name later e.g., grrrapp.com

    # Frontend Route (Static files built by React Vite or Vue)
    root /var/www/grrrapp/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API Route
    location /api/ {
        # Proxy requests to FastAPI via Uvicorn running locally on port 8000
        proxy_pass http://127.0.0.1:8000;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep alive settings to reduce connection overhead
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Timeout settings (for larger requests, tweak if necessary)
        proxy_read_timeout 60s;
    }
}
